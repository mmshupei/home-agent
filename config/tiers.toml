# tiers.toml — tool-name regex → tier classification.
# A tool's tier is fixed; the profile decides enforcement (see profiles.toml).
# Order matters: first match wins. Unknown tools default to L2 (conservative).

[[rule]]
# L1 read-style: bare verbs, plus *__get / *__list / *__search (with or without
# trailing underscore-suffix like `_state`, `_states`, `_files`).
pattern = "^(filesystem__read|fetch|search|.*__get(_|$)|.*__list(_|$)|.*__search(_|$))"
tier    = 1
[[rule]]
pattern = "^playwright__(navigate|screenshot|extract|read_)"
tier    = 1
[[rule]]
pattern = "^ha__(get_state|list_)"
tier    = 1
[[rule]]
pattern = "^memory__read"
tier    = 1

# Claude CLI built-in meta tools that are read-only.
[[rule]]
pattern = "^(ToolSearch|TodoWrite|Read|Glob|Grep|WebFetch|WebSearch|NotebookRead|BashOutput)$"
tier    = 1

# Curated routines: rated at the tier of their highest sub-action.
[[rule]]
pattern = "^morning_brief$"
tier    = 1
[[rule]]
pattern = "^(good_night|leaving_home)$"
tier    = 3

# Finance read-only tools (M4).
[[rule]]
pattern = "^finance__(get_|list_)"
tier    = 1

[[rule]]
pattern = "^applescript__reminders__(add|complete|update)"
tier    = 2
[[rule]]
pattern = "^applescript__calendar__add"
tier    = 2
[[rule]]
pattern = "^ha__call_service__(light|switch|scene|media_player)"
tier    = 2
[[rule]]
pattern = "^playwright__(click|fill|select)"
tier    = 2
[[rule]]
pattern = "^filesystem__write"
tier    = 2
[[rule]]
pattern = "^memory__write"
tier    = 2

[[rule]]
pattern = "^ha__call_service__(lock|cover|alarm|garage)"
tier    = 3
[[rule]]
pattern = "^applescript__messages__send"
tier    = 3
[[rule]]
pattern = "^applescript__mail__send"
tier    = 3
[[rule]]
pattern = "^finance__(place_order|transfer|sell)"
tier    = 3
[[rule]]
pattern = "^playwright__(submit|confirm|purchase|pay)"
tier    = 3
[[rule]]
pattern = "^memory__delete"
tier    = 3
