# profiles.toml — how each invocation context enforces tiers.
# Tiers themselves are defined in tiers.toml; profiles only choose enforcement.
# Policy values: "allow" | "prompt_cli" | "prompt_push" | "deny"

[unattended]
description = "launchd-scheduled jobs (morning brief, prune)"
policy.1 = "allow"
policy.2 = "deny"
policy.3 = "deny"
domains  = ["chores", "finance"]

[interactive]
description = "Terminal CLI at the host Mac"
policy.1 = "allow"
policy.2 = "prompt_cli"
policy.3 = "prompt_cli"
domains  = ["home", "finance", "chores", "browse"]

[home]
description = "Hammerspoon hotkey at desk"
policy.1 = "allow"
policy.2 = "allow"
policy.3 = "prompt_cli"
domains  = ["home", "chores", "browse"]

# M10: Reachy and similar embodied devices. Real-time interactions can't
# survive approval prompts mid-utterance, so L2 is auto-allowed; L3 is
# hard-denied (the device role's max_tier=2 enforces this anyway, double
# locked here for clarity).
[embedded]
description = "Reachy Mini / embodied device interactions"
policy.1 = "allow"
policy.2 = "allow"
policy.3 = "deny"
domains  = ["storytelling", "child_interaction", "chores"]

[scheduled]
description = "Heartbeat-spawned subagent for a due scheduled action. No human is online to confirm L3, so L3 is hard-denied; L1 + L2 auto-allowed so reversible household actions (lights, scenes, scripts) can complete."
policy.1 = "allow"
policy.2 = "allow"
policy.3 = "deny"
domains  = ["home", "chores"]

[mobile]
description = "iOS Shortcuts / iMessage / Telegram / Tailscale"
policy.1 = "allow"
# L2 reversible side-effects auto-allowed so Telegram conversations don't
# stall on prompts — matches the REPL's `home` profile. L3 still requires
# explicit confirmation (Pushover when configured; deny otherwise — safest
# default for irreversible actions issued from a phone).
policy.2 = "allow"
policy.3 = "prompt_push"
domains  = ["home", "chores", "browse"]
